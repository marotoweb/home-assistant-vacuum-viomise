# Describes the custom services for the Viomi SE integration.

# --- NEW NAMESPACE SERVICES ---

viomise_clean_segment:
  name: Clean Segment(s)
  description: "Cleans one or more specific rooms (segments) identified by the vacuum's map."
  fields:
    segments:
      name: Segments
      description: "A list of room/segment IDs to clean."
      required: true
      example: "[16, 17]"
      selector:
        object: {}

viomise_clean_zone:
  name: Clean Zone
  description: "Cleans a specified rectangular zone one or more times."
  fields:
    zone:
      name: Zone
      description: "A list of one or more zones to clean. Each zone is a list of four coordinates [x1, y1, x2, y2]."
      required: true
      example: "[[25500, 25500, 27500, 27500]]"
      selector:
        object: {}
    repeats:
      name: Repeats
      description: "The number of times to repeat the zone cleaning (1 to 3 times)."
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 3
          mode: box

viomise_goto:
  name: Go To Point
  description: "Commands the vacuum to go to a specific coordinate on the map."
  fields:
    x_coord:
      name: X-Coordinate
      description: "The X-coordinate to go to."
      required: true
      example: 25500
      selector:
        number:
          min: 0
          max: 50000
          mode: box
          step: 100
    y_coord:
      name: Y-Coordinate
      description: "The Y-coordinate to go to."
      required: true
      example: 25500
      selector:
        number:
          min: 0
          max: 50000
          mode: box
          step: 100

viomise_clean_point:
  name: Clean Around Point
  description: "Commands the vacuum to perform a spot cleaning around a specific coordinate."
  fields:
    point:
      name: Point
      description: "A list containing the [X, Y] coordinates for the spot cleaning."
      required: true
      example: "[25500, 25500]"
      selector:
        object: {}

viomise_set_map:
  name: Set Active Map
  description: "Switches the active map. Provide one of the following: Name, Index, or ID."
  fields:
    map_name:
      name: Map Name
      description: "The name of the map as defined in the Xiaomi Home app (e.g., 'Ground Floor')."
      example: "Ground Floor"
      selector:
        text: {}
    map_index:
      name: Map Index
      description: "The numerical index in the map list (0 for the first map, 1 for the second, etc.)."
      example: 1
      selector:
        number:
          min: 0
          max: 10
          mode: box
    map_id:
      name: Map ID
      description: "The internal unique ID of the map (10-digit number)."
      example: 1775989514
      selector:
        number:
          min: 0
          max: 4294967295
          mode: box

# --- LEGACY COMPATIBILITY SERVICES ---
# These are kept so old automations and map cards still show documentation.

vacuum_clean_segment:
  name: "[Legacy] Clean Segment(s)"
  description: "Legacy service name for cleaning rooms. Please use viomise_clean_segment instead."
  fields:
    segments:
      name: Segments
      required: true
      selector:
        object: {}

xiaomi_clean_zone:
  name: "[Legacy] Clean Zone"
  description: "Legacy service name for zone cleaning. Please use viomise_clean_zone instead."
  fields:
    zone:
      name: Zone
      required: true
      selector:
        object: {}
    repeats:
      name: Repeats
      required: true
      selector:
        number:
          min: 1
          max: 3

vacuum_goto:
  name: "[Legacy] Go To Point"
  description: "Legacy service name for goto. Please use viomise_goto instead."
  fields:
    x_coord:
      name: X-Coordinate
      required: true
    y_coord:
      name: Y-Coordinate
      required: true

xiaomi_clean_point:
  name: "[Legacy] Clean Around Point"
  description: "Legacy service name for spot cleaning. Please use viomise_clean_point instead."
  fields:
    point:
      name: Point
      required: true
      selector:
        object: {}
